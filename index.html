<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>簡報練習 — N88141052 陳俊嘉</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-dim: rgba(88,166,255,0.15);
    --green: #3fb950;
    --green-dim: rgba(63,185,80,0.15);
    --yellow: #e3b341;
    --red: #f85149;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    padding: 10px 20px 8px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  #header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  #slide-counter {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }
  #slide-counter span { color: var(--accent); font-weight: 700; font-size: 15px; }
  #overall-progress {
    font-size: 12px;
    color: var(--green);
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  #progress-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }
  #dots {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    cursor: pointer;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .dot:hover { border-color: var(--accent); color: var(--accent); }
  .dot.current { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .dot.done { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .dot.done::after { content: '✓'; font-size: 11px; }
  .dot.done span { display: none; }

  /* ── Main ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* Slide panel */
  #slide-panel {
    flex: 0 0 60%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    padding: 16px;
    overflow: hidden;
  }
  #slide-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  /* Script panel */
  #script-panel {
    flex: 0 0 40%;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    overflow: hidden;
  }

  #en-section {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    scroll-behavior: smooth;
  }
  #en-section::-webkit-scrollbar { width: 4px; }
  #en-section::-webkit-scrollbar-track { background: transparent; }
  #en-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .en-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .sentence {
    padding: 9px 12px;
    margin-bottom: 6px;
    border-radius: var(--radius);
    border: 1.5px solid transparent;
    background: var(--surface2);
    cursor: pointer;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    transition: all 0.15s;
    position: relative;
  }
  .sentence::before {
    content: '▶';
    font-size: 9px;
    color: var(--text-muted);
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .sentence:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .sentence:hover::before { opacity: 1; }
  .sentence.playing {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: #fff;
    box-shadow: 0 0 0 3px rgba(88,166,255,0.2);
  }
  .sentence.playing::before { opacity: 1; color: var(--accent); }
  .sentence.heard {
    border-color: var(--green);
  }
  .sentence.heard::after {
    content: '✓';
    font-size: 10px;
    color: var(--green);
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
  }
  .sentence.heard::before { display: none; }
  .sentence.edited {
    border-color: var(--yellow);
    border-style: dashed;
  }
  .sentence.edited::before { color: var(--yellow); }
  .sentence.editing {
    border-color: var(--accent) !important;
    background: #1c2333 !important;
    outline: none;
    cursor: text;
    user-select: text;
    -webkit-user-select: text;
    box-shadow: 0 0 0 3px rgba(88,166,255,0.25);
  }
  .sentence.editing::before, .sentence.editing::after { display: none !important; }
  .edit-badge {
    font-size: 9px;
    color: var(--yellow);
    position: absolute;
    right: 10px;
    top: 6px;
    opacity: 0.8;
  }

  /* Controls */
  #controls {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    background: var(--surface);
    flex-shrink: 0;
  }
  .btn {
    padding: 7px 14px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #79b8ff; }
  .btn-stop { background: var(--surface2); color: var(--red); border: 1.5px solid var(--border); }
  .btn-stop:hover { background: rgba(248,81,73,0.15); border-color: var(--red); }
  .btn-stop:disabled { opacity: 0.4; cursor: default; }
  .speed-select {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 6px 8px;
    font-size: 12px;
    cursor: pointer;
  }
  #repeat-btn {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1.5px solid var(--border);
  }
  #repeat-btn.active {
    color: var(--yellow);
    border-color: var(--yellow);
    background: rgba(227,179,65,0.1);
  }

  /* Chinese section */
  #zh-section {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  #zh-toggle {
    width: 100%;
    padding: 10px 16px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    text-align: left;
    display: flex; align-items: center; gap: 6px;
    transition: color 0.15s;
  }
  #zh-toggle:hover { color: var(--text); }
  #zh-toggle .arrow { transition: transform 0.2s; font-size: 10px; }
  #zh-toggle.open .arrow { transform: rotate(90deg); }
  #zh-content {
    display: none;
    padding: 0 16px 12px;
    max-height: 160px;
    overflow-y: auto;
  }
  #zh-content.open { display: block; }
  .zh-line {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-muted);
    padding: 2px 0;
  }

  /* Footer */
  #footer {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .btn-nav {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-nav:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .btn-nav:disabled { opacity: 0.3; cursor: default; }
  #btn-done {
    flex: 1;
    padding: 9px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  #btn-done:hover { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  #btn-done.done-state {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-dim);
  }

  /* Celebration */
  #confetti-wrap {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 999;
    display: none;
  }
  .confetti-piece {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confettiFall 1.2s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #000;
    padding: 10px 24px;
    border-radius: 24px;
    font-weight: 700;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 1000;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Selection word popup */
  #sel-popup {
    position: fixed;
    display: none;
    align-items: center;
    gap: 7px;
    background: #2d333b;
    border: 1.5px solid var(--accent);
    border-radius: 20px;
    padding: 5px 6px 5px 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    z-index: 998;
    transform: translateX(-50%);
    white-space: nowrap;
    pointer-events: all;
  }
  #sel-popup.show { display: flex; }
  #sel-popup .sel-word {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #sel-popup .sel-play {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 14px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #sel-popup .sel-play:hover { background: #79b8ff; }
  #sel-popup .sel-close {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
    line-height: 1;
  }
  #sel-popup .sel-close:hover { color: var(--text); }

  /* ── 手機版 RWD ─────────────────────────────── */
  @media (max-width: 768px) {
    body { height: auto; min-height: 100vh; overflow-y: auto; overflow-x: hidden; }

    #header { padding: 8px 12px 6px; }
    .dot { width: 18px; height: 18px; font-size: 8px; }
    #dots { gap: 3px; }

    #main { flex-direction: column; overflow: visible; height: auto; }

    #slide-panel {
      flex: 0 0 auto;
      height: 54vw;
      min-height: 180px;
      padding: 8px;
    }

    #script-panel {
      flex: 0 0 auto;
      border-left: none;
      border-top: 1px solid var(--border);
      overflow: visible;
    }

    #en-section {
      overflow-y: visible;
      max-height: none;
      padding: 12px;
    }

    #controls {
      flex-wrap: wrap;
      padding: 8px 12px;
      gap: 6px;
    }
    #controls > div { order: 3; width: 100%; }
    #controls > div select { width: 100%; max-width: 100% !important; }
    #voice-hint { display: none; }
    #btn-play-all { flex: 1; justify-content: center; }
    #btn-stop { flex: 0 0 auto; }
    #speed-select { flex: 1; }
    #repeat-btn { flex: 0 0 auto; }

    #edge-hint { font-size: 11px; padding: 6px 12px; }

    #zh-content { max-height: 200px; }

    #footer { padding: 8px 12px; gap: 8px; }
    .btn-nav { padding: 8px 14px; font-size: 13px; }
    #btn-done { font-size: 13px; }

    #sel-popup { max-width: 90vw; }
    #sel-popup .sel-word { max-width: 120px; }
  }
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div id="slide-counter">第 <span id="cur-num">1</span> / 17 頁</div>
    <div id="overall-progress">完成 0 / 17</div>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="dots"></div>
</div>

<div id="main">
  <div id="slide-panel">
    <img id="slide-img" src="slides_img/slide_1.png" alt="投影片 1">
  </div>

  <div id="script-panel">
    <div id="en-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="en-label" style="margin-bottom:0">English Script — 點擊播放 / 雙擊編輯</div>
        <div style="display:flex;gap:6px;align-items:center">
          <button id="btn-sync" title="同步編輯到雲端（所有裝置共用）" style="background:none;border:1px solid var(--border);color:var(--accent);font-size:11px;cursor:pointer;padding:2px 8px;border-radius:4px">☁ 儲存</button>
          <button id="btn-reset-edits" title="重設此頁所有編輯" style="background:none;border:none;color:var(--text-muted);font-size:11px;cursor:pointer;padding:2px 6px;border-radius:4px;display:none">↩ 重設</button>
        </div>
      </div>
      <div id="sentences-list"></div>
    </div>

    <div id="controls">
      <button class="btn btn-primary" id="btn-play-all">▶ 全部播放</button>
      <button class="btn btn-stop" id="btn-stop" disabled>■ 停止</button>
      <div style="display:flex;flex-direction:column;gap:3px;min-width:0">
        <select class="speed-select" id="voice-select" title="選擇人聲" style="min-width:160px">
          <option value="">載入語音中…</option>
        </select>
      </div>
      <select class="speed-select" id="speed-select" title="播放速度">
        <option value="0.7">慢速 0.7×</option>
        <option value="0.85" selected>學習 0.85×</option>
        <option value="1.0">正常 1.0×</option>
        <option value="1.2">快速 1.2×</option>
      </select>
      <button class="btn btn-nav" id="repeat-btn" title="循環播放此頁">↺</button>
    </div>
    <div id="edge-hint" style="display:none;padding:7px 16px;background:#1c2128;border-top:1px solid var(--border);font-size:12px;color:var(--yellow);display:flex;align-items:center;gap:8px">
      <span>⚡ 用 Edge 開啟可解鎖 50+ 種 Natural 人聲</span>
      <button onclick="openInEdge()" style="background:var(--accent);color:#000;border:none;border-radius:5px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer">用 Edge 開啟</button>
    </div>
    <div id="ios-hint" style="display:none;padding:7px 14px;background:#1c2128;border-top:1px solid var(--border);font-size:11px;color:#aaa;line-height:1.6">
      📱 iPhone 語音選項太少？iOS 所有瀏覽器共用系統語音，需手動安裝英文語音包：<br>
      <strong style="color:#e2b84b">設定 → 輔助使用 → 語音內容 → 聲音 → English</strong><br>
      選任一英語聲音下載 → 回來重新整理頁面即可出現更多選項
    </div>

    <div id="zh-section">
      <button id="zh-toggle"><span class="arrow">▶</span> 中文對照</button>
      <div id="zh-content"><div id="zh-lines"></div></div>
    </div>
  </div>
</div>

<div id="footer">
  <button class="btn-nav" id="btn-prev">← 上一頁</button>
  <button id="btn-done">完成此頁 ✓</button>
  <button class="btn-nav" id="btn-next">下一頁 →</button>
</div>

<div id="confetti-wrap"></div>
<div id="toast"></div>

<!-- Sync QR Modal -->
<div id="sync-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:2000;align-items:center;justify-content:center;">
  <div style="background:#1c2128;border:1px solid #444;border-radius:14px;padding:24px;max-width:320px;width:90%;text-align:center">
    <div style="font-size:15px;font-weight:700;margin-bottom:4px;color:#e6edf3">☁ 同步到其他裝置</div>
    <div style="font-size:12px;color:#aaa;margin-bottom:14px">掃描 QR Code 或複製連結，在手機開啟即自動套用</div>
    <img id="sync-qr" src="" alt="QR Code" style="width:180px;height:180px;border-radius:8px;background:#fff;padding:6px">
    <div style="margin-top:12px;display:flex;gap:6px">
      <input id="sync-url-text" readonly style="flex:1;background:#0d1117;border:1px solid #444;border-radius:6px;padding:6px 8px;color:#aaa;font-size:11px;min-width:0">
      <button id="sync-copy-btn" style="background:var(--accent);border:none;border-radius:6px;padding:6px 12px;font-weight:700;font-size:12px;cursor:pointer;color:#000;white-space:nowrap">複製</button>
    </div>
    <button onclick="document.getElementById('sync-modal').style.display='none'" style="margin-top:12px;width:100%;background:none;border:1px solid #444;border-radius:6px;padding:7px;color:#aaa;cursor:pointer;font-size:13px">關閉</button>
  </div>
</div>

<div id="sel-popup">
  <span class="sel-word" id="sel-word-text"></span>
  <button class="sel-play" id="sel-play-btn">▶ 聽發音</button>
  <button class="sel-close" id="sel-close-btn">✕</button>
</div>

<script>
const SLIDES = [
  {
    en: [
      'Today, I will introduce "Developing an Explainable Deep Learning Module Based on the LSTM Framework for Flood Prediction."',
      'This paper was published in Frontiers in Water in 2025.',
      'I am Chen Chun Chia, and this is my presentation.'
    ],
    zh: [
      '今天我要介紹的題目是「以LSTM架構為基礎之可解釋深度學習洪水預測模組建構」。',
      '這篇論文發表於2025年的Frontiers in Water期刊。',
      '我是陳俊嘉，接下來開始我的報告。'
    ]
  },
  {
    en: [
      'On the left are traditional hydrological models.',
      'They are easy to understand, but they may not work well for very complex problems.',
      'In the middle is the LSTM neural network.',
      'It has very strong prediction ability, but people often cannot understand how it makes decisions, so it is called a "black box."',
      'On the right is our Explainable LSTM model.',
      'It keeps the strong prediction ability of LSTM, and also helps us understand what information the model is using.'
    ],
    zh: [
      '左邊是傳統水文模型。',
      '它們容易理解，但面對很複雜的問題時，效果可能沒有那麼好。',
      '中間是LSTM神經網路。',
      '它的預測能力很強，但我們通常不知道它是怎麼做出判斷的，所以常被稱為「黑盒子」。',
      '右邊則是本研究提出的Explainable LSTM模型。',
      '它保留了LSTM強大的預測能力，同時也讓我們知道模型是根據哪些資訊來做判斷。'
    ]
  },
  {
    en: [
      'The model uses 30 days of rainfall, temperature, and streamflow data as input.',
      'First, the Gated Module filters important information.',
      'Then, Self-Attention learns the relationships between different variables.',
      'After that, the LSTM learns time patterns from the data,',
      'and the FCNN gives the final streamflow prediction.',
      'This method not only improves prediction performance,',
      'but also helps us better understand how the model works.'
    ],
    zh: [
      '模型會使用過去30天的降雨、溫度與流量資料作為輸入。',
      '首先，Gated Module會先篩選重要資訊。',
      '接著，Self-Attention會學習不同變數之間的關係。',
      '之後，LSTM會學習資料中的時間變化特徵，',
      '最後由FCNN輸出最終的流量預測結果。',
      '這個方法不僅提升了預測能力，',
      '也讓我們更容易理解模型是如何運作的。'
    ]
  },
  {
    en: [
      'We used the CAMELS dataset from the United States, which includes 531 catchments.',
      'The model uses six input variables,',
      'including rainfall, radiation, temperature, vapor pressure, and streamflow.',
      'The data were divided into training and testing periods',
      'to train and evaluate the prediction model.'
    ],
    zh: [
      '我們使用美國的CAMELS資料集，',
      '共包含531個集水區。',
      '模型使用6種輸入變數，',

function voiceGender(v) {
  // 先從名字提取第一個英文詞來查表
  const firstName = v.name.replace(/^(Microsoft|Google)\s+/i,'').split(/\s+/)[0];
  if (GENDER_TABLE[firstName]) return GENDER_TABLE[firstName];
  // 退路：名字含 female/male 關鍵字
  if (/female/i.test(v.name)) return 'F';
  if (/male/i.test(v.name)) return 'M';
  return null; // 不明
}

function shortVoiceName(v) {
  return v.name
    .replace(/^(Microsoft|Google)\s+/i,'')
    .replace(/\s+Online\s*\(Natural\)/i,'')
    .replace(/\s+Desktop$/i,'')
    .replace(/\s+[-–].+$/,'');
}

let voiceInitDone = false;

function buildVoiceSelect(voices) {
  allEnVoices = voices;
  const sel = document.getElementById('voice-select');
  const saved = localStorage.getItem('ppt_voice_n88141052');

  // 如果已有選項且數量正確就不重建（避免手機多次觸發閃動）
  const prevCount = sel.options.length;
  const newCount = voices.filter(v =>
    v.lang.startsWith('en-US') || v.lang.startsWith('en-GB') || v.lang.startsWith('zh-TW')
  ).length;
  if (voiceInitDone && prevCount > 1 && newCount <= prevCount) return;

  sel.innerHTML = '';

  // High-quality pre-generated voices at top
  const pbGroup = document.createElement('optgroup');
  pbGroup.label = '★ 高品質音檔（推薦，所有裝置）';
  Object.entries(PREBUILT).forEach(([val, info]) => {
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = info.label;
    if (val === saved) opt.selected = true;
    pbGroup.appendChild(opt);
  });
  sel.appendChild(pbGroup);
  if (!saved || saved.startsWith('prebuilt_')) {
    sel.value = saved || 'prebuilt_christopher';
  }

  // 語言代碼 → 顯示名稱
  const LANG_LABEL = {
    'en-US':'🇺🇸 英語 美國','en-GB':'🇬🇧 英語 英國','en-AU':'🇦🇺 英語 澳洲',
    'en-IN':'🇮🇳 英語 印度','en-CA':'🇨🇦 英語 加拿大','en-IE':'🇮🇪 英語 愛爾蘭',
    'en-NZ':'🇳🇿 英語 紐西蘭','en-SG':'🇸🇬 英語 新加坡','en-ZA':'🇿🇦 英語 南非',
    'en-PH':'🇵🇭 英語 菲律賓','en-HK':'🇭🇰 英語 香港',
    'zh-TW':'🇹🇼 中文 台灣','zh-CN':'🇨🇳 中文 中國','zh-HK':'🇭🇰 中文 香港',
    'ja-JP':'🇯🇵 日語','ko-KR':'🇰🇷 韓語',
    'fr-FR':'🇫🇷 法語','de-DE':'🇩🇪 德語','es-ES':'🇪🇸 西班牙語',
    'it-IT':'🇮🇹 義大利語','pt-BR':'🇧🇷 葡萄牙語',
  };

  // 以語言代碼分組，保留原始順序
  const langMap = new Map();
  voices.forEach(v => {
    const lang = v.lang || 'other';
    if (!langMap.has(lang)) langMap.set(lang, []);
    langMap.get(lang).push(v);
  });

  // 排序：英語系優先，其次中文，其餘按字母
  const sortedLangs = [...langMap.keys()].sort((a, b) => {
    const pa = a.startsWith('en') ? 0 : a.startsWith('zh') ? 1 : 2;
    const pb = b.startsWith('en') ? 0 : b.startsWith('zh') ? 1 : 2;
    return pa !== pb ? pa - pb : a.localeCompare(b);
  });

  let firstOpt = null;
  sortedLangs.forEach(lang => {
    const list = langMap.get(lang);
    const grp = document.createElement('optgroup');
    grp.label = LANG_LABEL[lang] || ('🌐 ' + lang);
    list.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.name;
      const nat = /Natural|Neural|Enhanced/i.test(v.name);
      const g = voiceGender(v);
      const gLabel = g === 'F' ? ' ♀' : g === 'M' ? ' ♂' : '';
      opt.textContent = (nat ? '★ ' : '') + shortVoiceName(v) + gLabel;
      if (v.name === saved) opt.selected = true;
      if (!firstOpt) firstOpt = opt;
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  });

  if (!saved || !sel.value) {
    const jenny = voices.find(v => v.name.includes('Jenny'));
    sel.value = jenny ? jenny.name : (firstOpt ? firstOpt.value : '');
  }

  const hasNatural = voices.some(v => /Natural|Neural|Enhanced/i.test(v.name));
  const isEdge = navigator.userAgent.includes('Edg/');
  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
  document.getElementById('edge-hint').style.display =
    (!hasNatural && !isEdge && !isIOS) ? 'flex' : 'none';
  // Show iOS tip when there are very few voices (iOS Safari default)
  document.getElementById('ios-hint').style.display =
    (isIOS && voices.length <= 3) ? 'block' : 'none';

  voiceInitDone = true;
}

function initVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) {
    buildVoiceSelect(voices);
  }
}

// 手機瀏覽器（iOS/Android）常常需要多次重試才能取得語音列表
let _retryCount = 0;
function retryInitVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 1) {
    buildVoiceSelect(voices);
    return;
  }
  if (_retryCount < 8) {
    _retryCount++;
    setTimeout(retryInitVoice, 300 * _retryCount); // 300ms, 600ms, 900ms…
  }
}

  showToast(matched ? '✓ ' + shortVoiceName(matched) : shortVoiceName({ name: this.value }));
});

function getSelectedVoice() {
  const name = document.getElementById('voice-select').value;
  // Use the cached list from buildVoiceSelect; calling getVoices() again
  // can return an empty or mismatched list on iOS/Android, causing silent fallback.
  const voices = allEnVoices.length ? allEnVoices : window.speechSynthesis.getVoices();
  return voices.find(v => v.name === name) || null;
}

// Render dots
function renderDots() {
  const wrap = document.getElementById('dots');
  wrap.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === currentSlide ? ' current' : '') + (completed[i] ? ' done' : '');
    dot.title = `第 ${i+1} 頁`;
    dot.innerHTML = completed[i] ? '<span></span>' : `<span>${i+1}</span>`;
    dot.addEventListener('click', () => goToSlide(i));
    wrap.appendChild(dot);
  }
}

function editKey(si, idx) { return `ppt_edit_${si}_${idx}`; }

function getSentenceText(si, idx) {
  return localStorage.getItem(editKey(si, idx)) || SLIDES[si].en[idx];
}

function saveEditText(si, idx, text) {
  const orig = SLIDES[si].en[idx];
  if (text.trim() === '' || text.trim() === orig) {
    localStorage.removeItem(editKey(si, idx));
  } else {
    localStorage.setItem(editKey(si, idx), text.trim());
  }
}

function hasEditsOnSlide(si) {
  return SLIDES[si].en.some((_, idx) => localStorage.getItem(editKey(si, idx)));
}

function startEditing(div, si, idx) {
  if (div.classList.contains('editing')) return;
  stopSpeech();
  const original = getSentenceText(si, idx);
  div.classList.add('editing');
  div.contentEditable = 'true';
  div.focus();
  // Move cursor to end
  const range = document.createRange();
  range.selectNodeContents(div);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  function commit() {
    if (!div.classList.contains('editing')) return;
    div.contentEditable = 'false';
    div.classList.remove('editing');
    const newText = div.textContent.trim();
    saveEditText(si, idx, newText);
    div.textContent = getSentenceText(si, idx);
    refreshEditState(div, si, idx);
    updateResetBtn(si);
  }
  function cancel() {
    div.contentEditable = 'false';
    div.classList.remove('editing');
    div.textContent = original;
  }
  div.addEventListener('blur', commit, { once: true });
  div.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); div.blur(); }
    if (e.key === 'Escape') { div.removeEventListener('blur', commit); cancel(); }
  }, { once: true });
}

function refreshEditState(div, si, idx) {
  const isEdited = !!localStorage.getItem(editKey(si, idx));
  div.classList.toggle('edited', isEdited);
  let badge = div.querySelector('.edit-badge');
  if (isEdited) {
    if (!badge) { badge = document.createElement('span'); badge.className = 'edit-badge'; div.appendChild(badge); }
    badge.textContent = '✏';
  } else if (badge) {
    badge.remove();
  }
}

function updateResetBtn(si) {
  const btn = document.getElementById('btn-reset-edits');
  if (btn) btn.style.display = hasEditsOnSlide(si) ? 'inline-block' : 'none';
}

function renderSentences() {
  heardSentences = [];
  const list = document.getElementById('sentences-list');
  list.innerHTML = '';
  const si = currentSlide;
  const data = SLIDES[si];
  data.en.forEach((_, idx) => {
    const text = getSentenceText(si, idx);
    const div = document.createElement('div');
    div.className = 'sentence';
    div.dataset.idx = idx;
    div.textContent = text;
    refreshEditState(div, si, idx);
    div.addEventListener('click', e => {
      if (!div.classList.contains('editing')) speakSentence(idx);
    });
    div.addEventListener('dblclick', e => {
      e.preventDefault();
      startEditing(div, si, idx);
    });
    list.appendChild(div);
  });
  updateResetBtn(si);
  // Chinese
  const zhList = document.getElementById('zh-lines');
  zhList.innerHTML = '';
  data.zh.forEach(line => {
    const div = document.createElement('div');
    div.className = 'zh-line';
    div.textContent = line;
    zhList.appendChild(div);
  });
}

// Update header
function updateHeader() {
  document.getElementById('cur-num').textContent = currentSlide + 1;
  const doneCount = completed.filter(Boolean).length;
  document.getElementById('overall-progress').textContent = `完成 ${doneCount} / ${TOTAL}`;
  document.getElementById('progress-bar').style.width = (doneCount / TOTAL * 100) + '%';
}

// Update footer buttons
function updateFooter() {
  document.getElementById('btn-prev').disabled = currentSlide === 0;
  document.getElementById('btn-next').disabled = currentSlide === TOTAL - 1;
  const btnDone = document.getElementById('btn-done');
  if (completed[currentSlide]) {
    btnDone.textContent = '✓ 已完成此頁';
    btnDone.classList.add('done-state');
  } else {
    btnDone.textContent = '完成此頁 ✓';
    btnDone.classList.remove('done-state');
  }
}

// Go to slide
function goToSlide(idx) {
  stopSpeech();
  currentSlide = idx;
  document.getElementById('slide-img').src = `slides_img/slide_${idx + 1}.png`;
  renderSentences();
  updateHeader();
  updateFooter();
  renderDots();
  saveProgress();
  document.getElementById('en-section').scrollTop = 0;
}

// Unified single-sentence player: uses pre-generated MP3 when available, else Web Speech API
function playOneSentence(si, idx, onEnd, onError) {
  const text = getSentenceText(si, idx);
  const speed = parseFloat(document.getElementById('speed-select').value);
  const isOrig = text === SLIDES[si].en[idx];

  clearTimeout(_stopRetryTimer); _stopRetryTimer = null;

  if (isPrebuilt() && isOrig) {
    const url = `audio/${prebuiltFolder()}/${si + 1}_${idx}.mp3`;
    audioEl.src = url;
    audioEl.playbackRate = Math.min(Math.max(speed, 0.5), 4);
    audioEl.onended = onEnd;
    audioEl.onerror = onError;
    audioEl.play().catch(onError);
  } else {
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = speed;
    if (!isPrebuilt()) { const v = getSelectedVoice(); if (v) utter.voice = v; }
    utter.lang = 'en-US';
    utter.onend = onEnd;
    utter.onerror = onError;
    window.speechSynthesis.speak(utter);
  }
}

// Speak single sentence
function speakSentence(idx) {
  stopSpeech();
  const si = currentSlide;
  highlightSentence(idx);
  isPlaying = true;
  document.getElementById('btn-stop').disabled = false;
  playOneSentence(si, idx,
    () => { markHeard(idx); clearHighlight(); isPlaying = false; document.getElementById('btn-stop').disabled = true; },
    () => { clearHighlight(); isPlaying = false; document.getElementById('btn-stop').disabled = true; }
  );
}

// Play all sentences
function playAll(startIdx = 0) {
  stopSpeech();
  const si = currentSlide;
  const total = SLIDES[si].en.length;
  isPlaying = true;
  document.getElementById('btn-stop').disabled = false;

  function playNext(idx) {
    if (!isPlaying) return;
    if (idx >= total) {
      isPlaying = false;
      document.getElementById('btn-stop').disabled = true;
      clearHighlight();
      if (repeatMode) setTimeout(() => playAll(0), 800);
      return;
    }
    highlightSentence(idx);
    scrollToSentence(idx);
    playOneSentence(si, idx,
      () => { markHeard(idx); playNext(idx + 1); },
      () => { clearHighlight(); isPlaying = false; document.getElementById('btn-stop').disabled = true; }
    );
  }
  playNext(startIdx);
}

function highlightSentence(idx) {
  document.querySelectorAll('.sentence').forEach(el => el.classList.remove('playing'));
  const el = document.querySelector(`.sentence[data-idx="${idx}"]`);
  if (el) el.classList.add('playing');
}
function clearHighlight() {
  document.querySelectorAll('.sentence').forEach(el => el.classList.remove('playing'));
}
function markHeard(idx) {
  if (!heardSentences.includes(idx)) heardSentences.push(idx);
  const el = document.querySelector(`.sentence[data-idx="${idx}"]`);
  if (el) { el.classList.remove('playing'); el.classList.add('heard'); }
}
function scrollToSentence(idx) {
  const el = document.querySelector(`.sentence[data-idx="${idx}"]`);
  if (!el) return;
  // Only scroll when #en-section has its own scrollbar (desktop layout).
  // On mobile, en-section is overflow:visible and scrollIntoView would
  // scroll the page body, pulling the user away from where they scrolled.
  const section = document.getElementById('en-section');
  const ov = getComputedStyle(section).overflowY;
  if (ov === 'auto' || ov === 'scroll') {
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}
function stopSpeech() {
  isPlaying = false;
  clearTimeout(_stopRetryTimer);
  try { audioEl.pause(); audioEl.currentTime = 0; audioEl.onended = null; audioEl.onerror = null; } catch(e) {}
  try { window.speechSynthesis.cancel(); } catch(e) {}
  clearHighlight();
  document.getElementById('btn-stop').disabled = true;
  _stopRetryTimer = setTimeout(() => {
    _stopRetryTimer = null;
    try { if (window.speechSynthesis.speaking || window.speechSynthesis.pending) window.speechSynthesis.cancel(); } catch(e) {}
  }, 80);
}

// Mark done
function markDone() {
  const wasAlready = completed[currentSlide];
  completed[currentSlide] = !wasAlready;
  updateHeader();
  updateFooter();
  renderDots();
  saveProgress();
  if (completed[currentSlide]) {
    showToast('✓ 第 ' + (currentSlide + 1) + ' 頁完成！');
    celebrate();
    if (currentSlide < TOTAL - 1) {
      setTimeout(() => goToSlide(currentSlide + 1), 1200);
    }
  }
}

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Celebrate confetti
function celebrate() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.style.display = 'block';
  wrap.innerHTML = '';
  const colors = ['#58a6ff','#3fb950','#e3b341','#f0883e','#bc8cff'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      top: -10px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${6 + Math.random() * 8}px;
      height: ${6 + Math.random() * 8}px;
      animation-delay: ${Math.random() * 0.5}s;
      animation-duration: ${1 + Math.random() * 0.8}s;
    `;
    wrap.appendChild(p);
  }
  setTimeout(() => { wrap.style.display = 'none'; wrap.innerHTML = ''; }, 2000);
}

// Event listeners
document.getElementById('btn-play-all').addEventListener('click', () => playAll(0));
document.getElementById('btn-stop').addEventListener('click', stopSpeech);
document.getElementById('btn-reset-edits').addEventListener('click', () => {
  if (!confirm('確定要重設此頁所有編輯？')) return;
  SLIDES[currentSlide].en.forEach((_, idx) => localStorage.removeItem(editKey(currentSlide, idx)));
  renderSentences();
  showToast('已重設此頁所有編輯');
});
document.getElementById('btn-prev').addEventListener('click', () => goToSlide(currentSlide - 1));
document.getElementById('btn-next').addEventListener('click', () => goToSlide(currentSlide + 1));
document.getElementById('btn-done').addEventListener('click', markDone);

document.getElementById('repeat-btn').addEventListener('click', () => {
  repeatMode = !repeatMode;
  document.getElementById('repeat-btn').classList.toggle('active', repeatMode);
  showToast(repeatMode ? '循環模式已開啟' : '循環模式已關閉');
});

document.getElementById('zh-toggle').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('zh-content').classList.toggle('open');
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowRight' && currentSlide < TOTAL - 1) goToSlide(currentSlide + 1);
  if (e.key === 'ArrowLeft' && currentSlide > 0) goToSlide(currentSlide - 1);
  if (e.key === ' ') { e.preventDefault(); isPlaying ? stopSpeech() : playAll(0); }
  if (e.key === 'Enter') markDone();
  if (e.key === 'Escape') hideSelPopup();
});

// ── 選字發音 ──────────────────────────────────────
let selWord = '';

function showSelPopup(text, anchorRect) {
  selWord = text;
  const popup = document.getElementById('sel-popup');
  document.getElementById('sel-word-text').textContent = `"${text}"`;
  // 計算位置：選取範圍正上方，水平居中
  const x = anchorRect.left + anchorRect.width / 2;
  const y = anchorRect.top + window.scrollY - 52;
  popup.style.left = x + 'px';
  popup.style.top = Math.max(y, 8) + 'px';
  popup.classList.add('show');
}

function hideSelPopup() {
  document.getElementById('sel-popup').classList.remove('show');
  selWord = '';
}

function speakWord(text) {
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = parseFloat(document.getElementById('speed-select').value);
  utter.lang = 'en-US';
  const v = getSelectedVoice(); if (v) utter.voice = v;
  utter.onend = () => hideSelPopup();
  window.speechSynthesis.speak(utter);
}

// 在英文稿區域監聽滑鼠放開
document.getElementById('en-section').addEventListener('mouseup', () => {
  setTimeout(() => {               // 等瀏覽器完成選取
    const sel = window.getSelection();
    const text = sel.toString().trim().replace(/\s+/g, ' ');
    if (!text || text.length > 80) { hideSelPopup(); return; }
    const range = sel.getRangeAt(0);
    showSelPopup(text, range.getBoundingClientRect());
  }, 10);
});

// 點別處關閉彈窗
document.addEventListener('mousedown', e => {
  const popup = document.getElementById('sel-popup');
  if (!popup.contains(e.target)) hideSelPopup();
});

document.getElementById('sel-play-btn').addEventListener('click', () => {
  if (selWord) speakWord(selWord);
});
document.getElementById('sel-close-btn').addEventListener('click', hideSelPopup);

// ── Sync via URL / QR Code (no external service, no token) ───────────────────
function getAllLocalEdits() {
  const edits = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('ppt_edit_')) edits[k] = localStorage.getItem(k);
  }
  return edits;
}

function applySyncFromHash() {
  try {
    const hash = location.hash;
    if (!hash.startsWith('#sync=')) return;
    const encoded = hash.slice(6);
    const edits = JSON.parse(decodeURIComponent(escape(atob(encoded))));
    let applied = 0;
    for (const [k, v] of Object.entries(edits)) { localStorage.setItem(k, v); applied++; }
    history.replaceState(null, '', location.pathname);
    if (applied > 0) { renderSentences(); showToast('✓ 套用 ' + applied + ' 筆同步編輯'); }
  } catch(e) {}
}

function showSyncModal(url) {
  document.getElementById('sync-modal').style.display = 'flex';
  const qrSrc = 'https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl=' + encodeURIComponent(url);
  document.getElementById('sync-qr').src = qrSrc;
  document.getElementById('sync-url-text').value = url;
}

function saveEditsToSync() {
  const edits = getAllLocalEdits();
  if (Object.keys(edits).length === 0) { showToast('尚無編輯內容'); return; }
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(edits))));
  const url = location.origin + location.pathname + '#sync=' + encoded;
  showSyncModal(url);
}

document.getElementById('btn-sync').addEventListener('click', saveEditsToSync);
document.getElementById('sync-copy-btn').addEventListener('click', () => {
  const url = document.getElementById('sync-url-text').value;
  navigator.clipboard.writeText(url).then(() => showToast('✓ 連結已複製！')).catch(() => {
    document.getElementById('sync-url-text').select();
  });
});

// Init
loadProgress();
renderDots();
renderSentences();
updateHeader();
updateFooter();
document.getElementById('slide-img').src = `slides_img/slide_${currentSlide + 1}.png`;

// Apply sync edits if URL contains #sync=...
applySyncFromHash();

// Keyboard hint
setTimeout(() => showToast('← → 換頁　Space 播放　Enter 完成'), 500);
</script>
